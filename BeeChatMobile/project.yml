name: BeeChatMobile

targets:
  BeeChatMobileKit:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/BeeChatMobileKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.ambox.beechatmobile.kit"
        INFOPLIST_FILE: Sources/BeeChatMobileKit/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
    dependencies:
      - package: BeeChat-v5
        product: BeeChatPersistence
      - package: BeeChat-v5
        product: BeeChatGateway
      - package: BeeChat-v5
        product: BeeChatSyncBridge
  BeeChatUI:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/BeeChatUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.ambox.beechatmobile.ui"
        INFOPLIST_FILE: Sources/BeeChatUI/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
    dependencies:
      - target: BeeChatMobileKit
      - package: Chat
        product: ExyteChat
  BeeChatMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.ambox.beechatmobile"
        INFOPLIST_FILE: Sources/App/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
    dependencies:
      - target: BeeChatUI
      - target: BeeChatMobileKit
packages:
  Chat:
    url: https://github.com/exyte/Chat
    exactVersion: 2.7.10
  BeeChat-v5:
    path: ../../BeeChat-v5
