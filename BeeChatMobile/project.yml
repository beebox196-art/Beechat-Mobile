name: BeeChatMobile

targets:
  BeeChatMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/App
      - Sources/BeeChatMobileKit
      - Sources/BeeChatUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.ambox.beechatmobile"
        INFOPLIST_FILE: Sources/App/Info.plist
        SWIFT_VERSION: "5.0"
    dependencies:
      - package: Chat
        product: ExyteChat
      - package: BeeChat-v5
        product: BeeChatPersistence
      - package: BeeChat-v5
        product: BeeChatGateway
      - package: BeeChat-v5
        product: BeeChatSyncBridge
packages:
  Chat:
    url: https://github.com/exyte/Chat
    exactVersion: 2.7.10
  BeeChat-v5:
    path: ../../BeeChat-v5